comments:
  service:

inject:
  head:
    - |
      <link rel="icon" type="image/svg+xml" href="/favicon.svg">
      <link rel="apple-touch-icon" href="/favicon.svg">
    - |
      <style>
        .l_body[type='tech'] article.content h2 > a:first-child:before,
        .l_body[type='tech'] article.content h3 > a:first-child:before {
          content: ' ';
        }

        #post-meta .busuanzi-pageviews {
          display: none;
          align-items: center;
          gap: 0.25rem;
        }

        #post-meta .busuanzi-pageviews.ready {
          display: inline-flex;
        }

        #post-meta .busuanzi-pageviews svg {
          width: 1rem;
          height: 1rem;
        }
      </style>
    - |
      <script defer src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
    - |
      <script>
        (() => {
          const injectBusuanziViews = () => {
            const meta = document.querySelector('#post-meta');
            const article = document.querySelector('article.md-text.content');
            if (!meta || !article || meta.querySelector('.busuanzi-pageviews')) return;

            const wrapper = document.createElement('span');
            wrapper.className = 'text busuanzi-pageviews';
            wrapper.innerHTML = `
              <span class="sep">·</span>
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M12 5c5.23 0 9.47 3.36 11 7c-1.53 3.64-5.77 7-11 7S2.53 15.64 1 12c1.53-3.64 5.77-7 11-7m0 2c-3.87 0-7.16 2.33-8.72 5C4.84 14.67 8.13 17 12 17s7.16-2.33 8.72-5C19.16 9.33 15.87 7 12 7m0 2.5a2.5 2.5 0 1 1 0 5a2.5 2.5 0 0 1 0-5"/>
              </svg>
              <span>阅读 <span id="busuanzi_value_page_pv"></span> 次</span>
            `;
            meta.appendChild(wrapper);

            const updateVisibility = () => {
              const value = wrapper.querySelector('#busuanzi_value_page_pv')?.textContent?.trim();
              if (value) {
                wrapper.classList.add('ready');
              }
            };

            updateVisibility();
            setTimeout(updateVisibility, 1200);
            setTimeout(updateVisibility, 3000);
          };

          if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', injectBusuanziViews);
          } else {
            injectBusuanziViews();
          }
        })();
      </script>
